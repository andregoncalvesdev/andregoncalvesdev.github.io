<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>André Gonçalves</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #00000f;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .profile-photo {
      width: clamp(180px, 32vw, 280px);
      height: auto;
      opacity: 0;
      transform: scale(0.88);
      transition: opacity 1.6s ease, transform 1.6s ease;
    }

    .profile-photo.revealed {
      opacity: 1;
      transform: scale(1);
    }

    .info {
      text-align: center;
      color: #fff;
    }

    .name {
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      font-weight: 500;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 1.1s ease, transform 1.1s ease;
    }

    .name.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    .role {
      font-size: clamp(0.8rem, 1.4vw, 0.9rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 1.1s ease, transform 1.1s ease;
    }

    .role.revealed {
      opacity: 0.5;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="content">
    <img src="/assets/profile.png" alt="André Gonçalves" class="profile-photo">
    <div class="info">
      <div class="name">André Gonçalves</div>
      <div class="role">Code at Uphold</div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── Renderer ──────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    const dpr = Math.min(window.devicePixelRatio, 2);
    renderer.setPixelRatio(dpr);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x00000f, 1);

    // ── Scene & Camera ────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x00000f, 0.09); // dense at start, clears during intro

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);

    // ── Intro camera path ─────────────────────────────────────────────────
    // Sweeps from close to the wave surface up to the settled overview position
    const INTRO_DUR   = 3.4;
    const camFrom     = new THREE.Vector3(14, 0.6, 4);
    const camTo       = new THREE.Vector3(0, 11, 28);
    const atFrom      = new THREE.Vector3(0, 2.5, -6);
    const atTo        = new THREE.Vector3(0, -3, 0);
    const lookTarget  = new THREE.Vector3();

    function easeInOutCubic(t) {
      return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
    }

    // DOM elements revealed in sync with camera arrival
    const photoEl = document.querySelector('.profile-photo');
    const nameEl  = document.querySelector('.name');
    const roleEl  = document.querySelector('.role');
    let photoShown = false, nameShown = false, roleShown = false;

    // ── Mouse / Touch ─────────────────────────────────────────────────────
    const mouse       = new THREE.Vector2(0, 0);
    const targetMouse = new THREE.Vector2(0, 0);

    window.addEventListener('mousemove', e => {
      targetMouse.x =  (e.clientX / window.innerWidth  - 0.5) * 2;
      targetMouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    window.addEventListener('touchmove', e => {
      if (e.touches.length > 0) {
        targetMouse.x =  (e.touches[0].clientX / window.innerWidth  - 0.5) * 2;
        targetMouse.y = -(e.touches[0].clientY / window.innerHeight - 0.5) * 2;
      }
    }, { passive: true });

    // ── Ocean particle grid ───────────────────────────────────────────────
    const GRID   = 160;
    const SPREAD = 64.0;
    const count  = GRID * GRID;

    const positions = new Float32Array(count * 3);
    const randoms   = new Float32Array(count);

    for (let ix = 0; ix < GRID; ix++) {
      for (let iz = 0; iz < GRID; iz++) {
        const i = ix * GRID + iz;
        positions[i * 3 + 0] = (ix / (GRID - 1) - 0.5) * SPREAD;
        positions[i * 3 + 1] = 0;
        positions[i * 3 + 2] = (iz / (GRID - 1) - 0.5) * SPREAD;
        randoms[i] = Math.random();
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aRandom',  new THREE.BufferAttribute(randoms,   1));

    // ── Vertex Shader ─────────────────────────────────────────────────────
    const vertexShader = /* glsl */`
      uniform float uTime;
      uniform vec2  uMouse;
      uniform float uPixelRatio;

      attribute float aRandom;

      varying float vElevation;
      varying float vEdgeFade;

      vec3 gerstner(vec2 pos, vec2 dir, float steepness, float wl, float spd) {
        float k = 6.28318 / wl;
        float c = sqrt(9.81 / k) * spd;
        float f = k * dot(normalize(dir), pos) - c * uTime;
        float a = steepness / k;
        return vec3(dir.x * a * cos(f), a * sin(f), dir.y * a * cos(f));
      }

      void main() {
        vec3 pos = position;

        vec3 w  = gerstner(pos.xz, vec2( 1.00,  0.30), 0.55, 12.0, 0.40);
            w += gerstner(pos.xz, vec2(-0.60,  1.00), 0.45,  8.0, 0.55);
            w += gerstner(pos.xz, vec2( 0.40, -0.80), 0.35,  5.5, 0.70);
            w += gerstner(pos.xz, vec2( 0.80,  0.60), 0.25,  3.5, 0.90);
            w += gerstner(pos.xz, vec2(-0.30, -0.50), 0.18,  2.2, 1.20);
            w += gerstner(pos.xz, vec2( 0.70, -0.20), 0.10,  1.4, 1.60);

        pos += w;

        vec2  mWorld = uMouse * 18.0;
        float mDist  = distance(pos.xz, mWorld);
        pos.y += sin(mDist * 1.3 - uTime * 4.5) * exp(-mDist * 0.20) * 2.2;

        vElevation = pos.y;

        float edge = length(position.xz) / (${SPREAD.toFixed(1)} * 0.5);
        vEdgeFade  = 1.0 - smoothstep(0.52, 1.0, edge);

        vec4 mvPos   = modelViewMatrix * vec4(pos, 1.0);
        gl_Position  = projectionMatrix * mvPos;

        float sz = (1.8 + aRandom * 2.8 + max(0.0, vElevation) * 0.9) * uPixelRatio;
        gl_PointSize = clamp(sz * 20.0 / -mvPos.z, 1.0, 16.0);
      }
    `;

    // ── Fragment Shader ───────────────────────────────────────────────────
    const fragmentShader = /* glsl */`
      varying float vElevation;
      varying float vEdgeFade;

      void main() {
        vec2  uv = gl_PointCoord - 0.5;
        float d  = length(uv);
        if (d > 0.5) discard;

        float t = clamp(vElevation * 0.32 + 0.48, 0.0, 1.0);

        vec3 deep  = vec3(0.00, 0.01, 0.10);
        vec3 mid   = vec3(0.02, 0.05, 0.48);
        vec3 surf  = vec3(0.07, 0.16, 0.95);
        vec3 foam  = vec3(0.35, 0.48, 1.00);

        vec3 col;
        if      (t < 0.42) col = mix(deep, mid,  t / 0.42);
        else if (t < 0.78) col = mix(mid,  surf, (t - 0.42) / 0.36);
        else               col = mix(surf, foam, (t - 0.78) / 0.22);

        float alpha = pow((0.5 - d) / 0.5, 1.5);
        alpha *= vEdgeFade;
        alpha *= 0.82 + t * 0.18;

        gl_FragColor = vec4(col, alpha);
      }
    `;

    const mat = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        uTime:       { value: 0 },
        uMouse:      { value: new THREE.Vector2() },
        uPixelRatio: { value: dpr },
      },
      transparent: true,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending,
    });

    scene.add(new THREE.Points(geo, mat));

    // ── Background star field ─────────────────────────────────────────────
    const STARS    = 2000;
    const starPos  = new Float32Array(STARS * 3);
    const starSize = new Float32Array(STARS);

    for (let i = 0; i < STARS; i++) {
      const r  = Math.random() * 200 + 60;
      const th = Math.random() * Math.PI * 2;
      const ph = Math.acos(Math.random() * 2 - 1);
      starPos[i*3]   = r * Math.sin(ph) * Math.cos(th);
      starPos[i*3+1] = r * Math.sin(ph) * Math.sin(th) + 50;
      starPos[i*3+2] = r * Math.cos(ph) - 70;
      starSize[i] = Math.random() * 1.2 + 0.3;
    }

    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,  3));
    starGeo.setAttribute('size',     new THREE.BufferAttribute(starSize, 1));

    const starMat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 }, uDPR: { value: dpr } },
      vertexShader: /* glsl */`
        attribute float size;
        uniform float uTime;
        uniform float uDPR;
        varying float vAlpha;
        void main() {
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_Position  = projectionMatrix * mv;
          float twinkle = sin(uTime * 1.8 + position.x * 0.4 + position.z * 0.3) * 0.35 + 0.65;
          vAlpha = twinkle * smoothstep(200.0, 40.0, -mv.z);
          gl_PointSize = size * uDPR * (120.0 / -mv.z);
        }
      `,
      fragmentShader: /* glsl */`
        varying float vAlpha;
        void main() {
          float d = length(gl_PointCoord - 0.5);
          if (d > 0.5) discard;
          float a = smoothstep(0.5, 0.0, d) * vAlpha;
          gl_FragColor = vec4(0.40, 0.52, 1.0, a);
        }
      `,
      transparent: true,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending,
    });

    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // ── Animation loop ────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      // Smooth mouse lag
      mouse.x += (targetMouse.x - mouse.x) * 0.04;
      mouse.y += (targetMouse.y - mouse.y) * 0.04;

      mat.uniforms.uTime.value     = elapsed;
      mat.uniforms.uMouse.value.copy(mouse);
      starMat.uniforms.uTime.value = elapsed;

      // ── Cinematic intro ─────────────────────────────────────────────────
      const raw   = Math.min(elapsed / INTRO_DUR, 1.0);
      const eased = easeInOutCubic(raw);

      // Camera position & lookAt sweep
      camera.position.lerpVectors(camFrom, camTo, eased);
      lookTarget.lerpVectors(atFrom, atTo, eased);

      // Mouse parallax fades in smoothly after intro settles (over 1s)
      const mouseBlend = Math.min(Math.max(elapsed - INTRO_DUR, 0) / 1.0, 1.0);
      camera.position.x += mouse.x * 3.5 * mouseBlend;
      camera.position.y += mouse.y * 2.0 * mouseBlend;
      lookTarget.y      += mouse.y * 0.6 * mouseBlend;

      camera.lookAt(lookTarget);

      // Fog clears as camera rises from the surface
      scene.fog.density = 0.09 - eased * (0.09 - 0.026);

      // ── Sync DOM reveals with camera progress ───────────────────────────
      if (!photoShown && raw > 0.58) {
        photoEl.classList.add('revealed');
        photoShown = true;
      }
      if (!nameShown && raw > 0.74) {
        nameEl.classList.add('revealed');
        nameShown = true;
      }
      if (!roleShown && raw > 0.86) {
        roleEl.classList.add('revealed');
        roleShown = true;
      }

      stars.rotation.y += 0.00008;
      renderer.render(scene, camera);
    }

    animate();

    // ── Resize ────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      const d = Math.min(window.devicePixelRatio, 2);
      mat.uniforms.uPixelRatio.value = d;
      starMat.uniforms.uDPR.value    = d;
    });
  </script>
</body>
</html>
