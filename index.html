<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>André Gonçalves</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020b18;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Bottom gradient for text readability */
    .gradient-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60vh;
      background: linear-gradient(
        to top,
        rgba(2, 11, 24, 1) 0%,
        rgba(2, 11, 24, 0.85) 35%,
        rgba(2, 11, 24, 0) 100%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* Top vignette */
    .top-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 20vh;
      background: linear-gradient(to bottom, rgba(2, 11, 24, 0.6) 0%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* Main content — bottom-left aligned */
    .content {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: clamp(2rem, 5vw, 5rem);
    }

    .name {
      font-size: clamp(3.2rem, 8.5vw, 8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.88;
      color: #ffffff;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 1.1s ease 0.25s, transform 1.1s ease 0.25s;
      margin-bottom: 1rem;
    }

    .role {
      font-size: clamp(0.85rem, 1.6vw, 1.15rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.4);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.9s ease 0.55s, transform 0.9s ease 0.55s;
      margin-bottom: 1.75rem;
    }

    .links {
      display: flex;
      gap: 2.25rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.9s ease 0.85s, transform 0.9s ease 0.85s;
    }

    .link {
      font-size: clamp(0.7rem, 1vw, 0.8rem);
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      position: relative;
      padding-bottom: 4px;
      transition: color 0.3s ease;
    }

    .link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: rgba(0, 200, 255, 0.75);
      transition: width 0.35s ease;
    }

    .link:hover {
      color: rgba(0, 210, 255, 0.95);
    }

    .link:hover::after {
      width: 100%;
    }

    .visible {
      opacity: 1 !important;
      transform: translateY(0) !important;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="top-overlay"></div>
  <div class="gradient-overlay"></div>

  <div class="content">
    <h1 class="name" id="name">André<br>Gonçalves</h1>
    <p class="role" id="role">Software Engineer &nbsp;·&nbsp; Uphold</p>
    <nav class="links" id="links">
      <a href="https://github.com/andregoncalvesdev" class="link" target="_blank" rel="noopener">GitHub</a>
      <a href="https://linkedin.com/in/andregoncalvesdev" class="link" target="_blank" rel="noopener">LinkedIn</a>
      <a href="mailto:andregoncalvesdev@gmail.com" class="link">Contact</a>
    </nav>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── Renderer ──────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    const dpr = Math.min(window.devicePixelRatio, 2);
    renderer.setPixelRatio(dpr);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x020b18, 1);

    // ── Scene & Camera ────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x020b18, 0.026);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 11, 28);
    camera.lookAt(0, -3, 0);

    // ── Mouse / Touch ─────────────────────────────────────────────────────
    const mouse       = new THREE.Vector2(0, 0);
    const targetMouse = new THREE.Vector2(0, 0);

    window.addEventListener('mousemove', e => {
      targetMouse.x =  (e.clientX / window.innerWidth  - 0.5) * 2;
      targetMouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    window.addEventListener('touchmove', e => {
      if (e.touches.length > 0) {
        targetMouse.x =  (e.touches[0].clientX / window.innerWidth  - 0.5) * 2;
        targetMouse.y = -(e.touches[0].clientY / window.innerHeight - 0.5) * 2;
      }
    }, { passive: true });

    // ── Ocean particle grid ───────────────────────────────────────────────
    const GRID   = 160;
    const SPREAD = 64.0;
    const count  = GRID * GRID;

    const positions = new Float32Array(count * 3);
    const randoms   = new Float32Array(count);

    for (let ix = 0; ix < GRID; ix++) {
      for (let iz = 0; iz < GRID; iz++) {
        const i = ix * GRID + iz;
        positions[i * 3 + 0] = (ix / (GRID - 1) - 0.5) * SPREAD;
        positions[i * 3 + 1] = 0;
        positions[i * 3 + 2] = (iz / (GRID - 1) - 0.5) * SPREAD;
        randoms[i] = Math.random();
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aRandom',  new THREE.BufferAttribute(randoms,   1));

    // ── Vertex Shader ─────────────────────────────────────────────────────
    const vertexShader = /* glsl */`
      uniform float uTime;
      uniform vec2  uMouse;
      uniform float uPixelRatio;

      attribute float aRandom;

      varying float vElevation;
      varying float vEdgeFade;

      // Gerstner wave — returns XYZ displacement
      vec3 gerstner(vec2 pos, vec2 dir, float steepness, float wl, float spd) {
        float k = 6.28318 / wl;
        float c = sqrt(9.81 / k) * spd;
        float f = k * dot(normalize(dir), pos) - c * uTime;
        float a = steepness / k;
        return vec3(dir.x * a * cos(f), a * sin(f), dir.y * a * cos(f));
      }

      void main() {
        vec3 pos = position;

        // Six layered waves — vary direction, steepness, wavelength & speed
        vec3 w  = gerstner(pos.xz, vec2( 1.00,  0.30), 0.55, 12.0, 0.40);
            w += gerstner(pos.xz, vec2(-0.60,  1.00), 0.45,  8.0, 0.55);
            w += gerstner(pos.xz, vec2( 0.40, -0.80), 0.35,  5.5, 0.70);
            w += gerstner(pos.xz, vec2( 0.80,  0.60), 0.25,  3.5, 0.90);
            w += gerstner(pos.xz, vec2(-0.30, -0.50), 0.18,  2.2, 1.20);
            w += gerstner(pos.xz, vec2( 0.70, -0.20), 0.10,  1.4, 1.60);

        pos += w;

        // Mouse-driven ripple
        vec2  mWorld = uMouse * 18.0;
        float mDist  = distance(pos.xz, mWorld);
        pos.y += sin(mDist * 1.3 - uTime * 4.5) * exp(-mDist * 0.20) * 2.2;

        vElevation = pos.y;

        // Fade particles near grid boundary
        float edge = length(position.xz) / (${SPREAD.toFixed(1)} * 0.5);
        vEdgeFade  = 1.0 - smoothstep(0.52, 1.0, edge);

        vec4 mvPos   = modelViewMatrix * vec4(pos, 1.0);
        gl_Position  = projectionMatrix * mvPos;

        // Point size: bigger at wave peaks & for random "sparkle" particles
        float sz = (1.8 + aRandom * 2.8 + max(0.0, vElevation) * 0.9) * uPixelRatio;
        gl_PointSize = clamp(sz * 20.0 / -mvPos.z, 1.0, 16.0);
      }
    `;

    // ── Fragment Shader ───────────────────────────────────────────────────
    const fragmentShader = /* glsl */`
      varying float vElevation;
      varying float vEdgeFade;

      void main() {
        vec2  uv = gl_PointCoord - 0.5;
        float d  = length(uv);
        if (d > 0.5) discard;

        // Map elevation to [0,1]
        float t = clamp(vElevation * 0.32 + 0.48, 0.0, 1.0);

        // Ocean colour ramp: deep navy → mid blue → cyan → near-white foam
        vec3 deep  = vec3(0.00, 0.04, 0.20);
        vec3 mid   = vec3(0.00, 0.22, 0.55);
        vec3 surf  = vec3(0.00, 0.62, 0.88);
        vec3 foam  = vec3(0.78, 0.96, 1.00);

        vec3 col;
        if      (t < 0.42) col = mix(deep, mid,  t / 0.42);
        else if (t < 0.78) col = mix(mid,  surf, (t - 0.42) / 0.36);
        else               col = mix(surf, foam, (t - 0.78) / 0.22);

        // Soft circular disc with edge fade
        float alpha = pow((0.5 - d) / 0.5, 1.5);
        alpha *= vEdgeFade;
        alpha *= 0.82 + t * 0.18;   // peaks slightly brighter

        gl_FragColor = vec4(col, alpha);
      }
    `;

    const mat = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        uTime:       { value: 0 },
        uMouse:      { value: new THREE.Vector2() },
        uPixelRatio: { value: dpr },
      },
      transparent: true,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending,
    });

    scene.add(new THREE.Points(geo, mat));

    // ── Background star field ─────────────────────────────────────────────
    const STARS    = 2000;
    const starPos  = new Float32Array(STARS * 3);
    const starSize = new Float32Array(STARS);

    for (let i = 0; i < STARS; i++) {
      const r  = Math.random() * 200 + 60;
      const th = Math.random() * Math.PI * 2;
      const ph = Math.acos(Math.random() * 2 - 1);
      starPos[i*3]   = r * Math.sin(ph) * Math.cos(th);
      starPos[i*3+1] = r * Math.sin(ph) * Math.sin(th) + 50;
      starPos[i*3+2] = r * Math.cos(ph) - 70;
      starSize[i] = Math.random() * 1.2 + 0.3;
    }

    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,  3));
    starGeo.setAttribute('size',     new THREE.BufferAttribute(starSize, 1));

    const starMat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 }, uDPR: { value: dpr } },
      vertexShader: /* glsl */`
        attribute float size;
        uniform float uTime;
        uniform float uDPR;
        varying float vAlpha;
        void main() {
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_Position  = projectionMatrix * mv;
          float twinkle = sin(uTime * 1.8 + position.x * 0.4 + position.z * 0.3) * 0.35 + 0.65;
          vAlpha = twinkle * smoothstep(200.0, 40.0, -mv.z);
          gl_PointSize = size * uDPR * (120.0 / -mv.z);
        }
      `,
      fragmentShader: /* glsl */`
        varying float vAlpha;
        void main() {
          float d = length(gl_PointCoord - 0.5);
          if (d > 0.5) discard;
          float a = smoothstep(0.5, 0.0, d) * vAlpha;
          gl_FragColor = vec4(0.7, 0.88, 1.0, a);
        }
      `,
      transparent: true,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending,
    });

    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // ── Animation loop ────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Smooth mouse lag
      mouse.x += (targetMouse.x - mouse.x) * 0.04;
      mouse.y += (targetMouse.y - mouse.y) * 0.04;

      mat.uniforms.uTime.value       = t;
      mat.uniforms.uMouse.value.copy(mouse);
      starMat.uniforms.uTime.value   = t;

      // Parallax camera drift
      camera.position.x = mouse.x * 3.5;
      camera.position.y = 11 + mouse.y * 2;
      camera.lookAt(0, -3 + mouse.y * 0.6, 0);

      // Stars drift slowly
      stars.rotation.y += 0.00008;

      renderer.render(scene, camera);
    }

    animate();

    // ── Resize ────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      const d = Math.min(window.devicePixelRatio, 2);
      mat.uniforms.uPixelRatio.value = d;
      starMat.uniforms.uDPR.value    = d;
    });

    // ── Entrance animations ───────────────────────────────────────────────
    const show = (id, delay) =>
      setTimeout(() => document.getElementById(id)?.classList.add('visible'), delay);

    show('name',  700);
    show('role',  1150);
    show('links', 1550);
  </script>
</body>
</html>
